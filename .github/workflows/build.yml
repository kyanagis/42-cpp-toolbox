name: build-and-push

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck
          shellcheck --severity=warning scripts/*.sh config/gdb-gef config/gdb-pwndbg config/gdb-peda \
            docker-entrypoint.sh run.sh tests/smoke/run.sh

      - name: hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build amd64 image (load)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: toolbox:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run --rm \
            --cap-add=SYS_PTRACE --security-opt seccomp=unconfined \
            -v "$PWD/tests":/work -w /work \
            toolbox:ci bash /work/smoke/run.sh

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push to GHCR
        if: github.event_name != 'pull_request'
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/42-cpp-toolbox"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker tag toolbox:ci "$IMAGE:latest"
            docker push "$IMAGE:latest"
          fi
          if [ "${{ github.ref_type }}" = "tag" ]; then
            docker tag toolbox:ci "$IMAGE:${{ github.ref_name }}"
            docker push "$IMAGE:${{ github.ref_name }}"
          fi
